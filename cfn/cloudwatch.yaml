AWSTemplateFormatVersion: '2010-09-09'

Resources:

  Dashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: my-dashboard-123
      DashboardBody: |
        {
          "widgets": [
            {
              "type": "text",
              "x": 0,
              "y": 0,
              "width": 6,
              "height": 3,
              "properties": {
                "markdown": "# AWS Dashboard Working"
              }
            }
          ]
        }